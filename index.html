<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday ❤️</title>

<link rel="stylesheet" href="css/style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Great+Vibes&display=swap" rel="stylesheet">

</head>

<body>

<div class="stars"></div>

<div class="container">

    <div class="card">

        <h1 class="title">
            Happy Birthday
        </h1>

        <h2 class="name">
            Jossika ❤️
        </h2>

        <h3 class="nickname">
            (My Kutty Paiya)
        </h3>

        <img src="images/jossika.jpg"
             class="birthday-image"
             alt="Jossika">

        <p class="question">
            Are you excited for what's next?
        </p>

        <div class="buttons">

            <button class="yesBtn">
                YES ❤️
            </button>

            <button class="noBtn">
                NO 😅
            </button>

        </div>

    </div>

</div>

<script src="js/script.js"></script>
</body>
</html>
