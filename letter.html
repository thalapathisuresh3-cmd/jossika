<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>A Message From My Heart ❤️</title>

<link rel="stylesheet" href="css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

</head>

<body class="letter-page">

<div class="letter-container">

    <h1 class="letter-title">
        💌 A Message From My Heart 💌
    </h1>

    <div class="letter-box">

        <p id="typing"></p>

    </div>

    <button class="gift-btn"
        onclick="window.location.href='final.html'">

        🎁 Open My Final Gift

    </button>

</div>

<script>

const message=`

Happy Birthday, My Kutty Paiya ❤️

Today is one of the most special days of my life,
because it is the day the most beautiful girl in the
world was born.

Thank you for making my life happier,
for making me smile,
and for being the reason behind so many beautiful memories.

I know we may not be perfect,
but every moment with you is perfect to me.

I wish all your dreams come true,
I wish you endless happiness,
good health,
success,
and a life filled with love.

No matter what happens,
I will always pray for your happiness.

You are my biggest blessing.

I Love You So Much ❤️

Happy Birthday Once Again,
My Kutty Paiya ❤️

- Yours,
Suresh ❤️

`;

let i=0;

function type(){

if(i<message.length){

document.getElementById("typing").innerHTML+=message.charAt(i);

i++;

setTimeout(type,35);

}

}

type();

<script src="js/script.js"></script>

</body>
</html>
